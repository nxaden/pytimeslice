name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements-dev.txt
            requirements.txt

      - name: Install project
        run: make bootstrap

      - name: Run checks
        run: make check

  package:
    runs-on: ubuntu-latest
    needs: check

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements-dev.txt
            requirements.txt

      - name: Install project
        run: make bootstrap

      - name: Build distributions
        run: |
          make clean
          make build
          make check-dist

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: pytimeslice-dist
          path: dist/*
